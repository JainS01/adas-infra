line-length = 100
target-version = "py311"
src = ["packages/*/src"]

[lint]
select = ["E", "F", "I", "N", "UP", "B", "A", "C4", "PT", "RUF", "S"]
ignore = ["ANN101", "ANN102", "ANN401", "S101", "S603", "S607"]

[lint.per-file-ignores]
"tests/**" = ["ANN", "S", "PT"]
"scripts/**" = ["ANN", "S"]
"conf/**" = []

[format]
quote-style = "double"
indent-style = "space"
