name: CI — lint, type-check, unit tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check packages/ tests/ scripts/

      - name: Ruff format check
        run: uv run ruff format --check packages/ tests/ scripts/

      - name: Bandit security scan
        run: uv run bandit -r packages/ -c pyproject.toml -q

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  type-check:
    name: MyPy type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync
      - run: uv run mypy packages/adas_infra_core/src packages/adas_infra_data/src packages/adas_infra_train/src --config-file mypy.ini

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync
      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short --timeout=60
