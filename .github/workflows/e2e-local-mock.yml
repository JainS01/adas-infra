name: E2E Local Mock — deterministic trial run

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-mock:
    name: Local End-to-End Mock Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Install dependencies (All Workspace Packages)
        run: uv sync --all-packages

      # Two complementary e2e checks:
      #  1. pipeline.py exercises the standalone, Hydra-free path (distinct coverage).
      #  2. the pytest suite is assertion-bearing — it gates the FastAPI /predict contract,
      #     the run_manifest.json reproducibility fields, TorchScript export, and registry.
      - name: Execute standalone training trial loop (smoke)
        run: uv run python packages/adas_infra_train/src/pipeline.py

      - name: Run E2E test suite (assertion-bearing)
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/packages/adas_infra_core:$(pwd)/packages/adas_infra_data:$(pwd)/packages/adas_infra_train
          uv run pytest tests/e2e/ -v --tb=short -m e2e --timeout=180