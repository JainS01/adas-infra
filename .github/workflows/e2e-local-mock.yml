name: E2E — local_mock pipeline (judge path, <180s CPU)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-local-mock:
    name: Full pipeline on ubuntu-latest CPU
    runs-on: ubuntu-latest
    timeout-minutes: 5     # fail fast if e2e takes >5 min

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install all packages (workspace)
        run: uv sync

      - name: Seed synthetic delta log
        run: |
          uv run python scripts/seed_delta_log.py \
            --synthetic \
            --num-shards 4 \
            --num-subjects 10 \
            --output-dir ./data/synthetic

      - name: Run E2E test suite (under 180s on CPU)
        run: uv run pytest tests/e2e/ -v -m e2e --timeout=180 --tb=short

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ github.sha }}
          path: |
            checkpoints/
            state/
            .last_run_id
