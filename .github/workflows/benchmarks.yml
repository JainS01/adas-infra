name: Benchmarks — continuous profiling & regression tracking

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  profile:
    name: Micro-benchmarks & Profiling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Install dependencies (All Workspace Packages)
        run: uv sync --all-packages

      - name: Run data-loader micro-benchmarks
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/packages/adas_infra_core:$(pwd)/packages/adas_infra_data:$(pwd)/packages/adas_infra_train
          # Removed the problematic --durations flag
          uv run pytest tests/benchmarks/ -v

      - name: Profile memory and I/O overhead
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/packages/adas_infra_core:$(pwd)/packages/adas_infra_data:$(pwd)/packages/adas_infra_train
          # Execute the script directly without trailing configuration flags
          uv run python scripts/seed_delta_log.py --synthetic