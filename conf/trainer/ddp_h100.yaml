# H100-cluster hyperparameters (large batch / long schedule). A dedicated DDP engine is a
# planned BaseTrainer subclass; until it exists this profile reuses SingleDeviceEngine so the
# config composes and the hyperparameters live in one place.
_target_: adas_infra.train.engines.single_device_engine.SingleDeviceEngine
seed: 42
max_steps: 10000
batch_size: 256
lr: 0.001
weight_decay: 0.0001
checkpoint_dir: ${oc.env:ADAS_CHECKPOINT_DIR,./checkpoints}
profile: cloud_prod
