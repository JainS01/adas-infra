global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "adas-training"
    static_configs:
      # host.docker.internal resolves to the Docker host on Mac/Windows
      # On Linux, use the host's actual IP or gateway
      - targets: ["host.docker.internal:9000"]
    relabel_configs:
      - target_label: instance
        replacement: "training-node"

  - job_name: "adas-inference"
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: /metrics
    relabel_configs:
      - target_label: instance
        replacement: "inference-node"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
