[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "adas-infra-obs"
version = "0.1.0"
description = "Observability: Prometheus metrics, Grafana dashboards, OTEL tracing"
requires-python = ">=3.11"
dependencies = [
    "adas-infra-core",
    "prometheus-client>=0.20.0",
]

[project.optional-dependencies]
gpu = ["pynvml>=11.5.0"]
otel = ["opentelemetry-api>=1.25.0", "opentelemetry-sdk>=1.25.0"]

[tool.uv.sources]
adas-infra-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/adas_infra"]

[tool.hatch.build]
sources = ["src"]
