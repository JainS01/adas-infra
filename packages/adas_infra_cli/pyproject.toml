[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "adas-infra-cli"
version = "0.1.0"
description = "CLI entrypoints: adas-train, adas-ingest, adas-serve, adas-publish-model"
requires-python = ">=3.11"
dependencies = [
    "adas-infra-core",
    "adas-infra-data",
    "adas-infra-train",
    "adas-infra-serve",
    "adas-infra-obs",
    "hydra-core>=1.3.2",
    "omegaconf>=2.3.0",
    "ray[data]>=2.23.0",
]

[project.scripts]
adas-train         = "adas_infra.cli.train:main"
adas-ingest        = "adas_infra.cli.ingest:main"
adas-serve         = "adas_infra.cli.serve:main"
adas-publish-model = "adas_infra.cli.publish_model:main"

[tool.hatch.build.targets.wheel]
packages = ["src/adas_infra"]

[tool.hatch.build]
sources = ["src"]
