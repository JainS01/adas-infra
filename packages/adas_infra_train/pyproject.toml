[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "adas-infra-train"
version = "0.1.0"
description = "Training engines: single-device, DDP, FSDP; hooks; checkpointing"
requires-python = ">=3.11"
dependencies = [
    "adas-infra-core",
    "adas-infra-data",
    "torch>=2.3.0",
    "torchvision>=0.18.0",
    "mlflow>=2.13.0",
    "numpy>=1.26.0",
    "pydantic>=2.7.0",
    "hydra-core>=1.3.2",
    "omegaconf>=2.3.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/adas_infra"]

[tool.hatch.build]
sources = ["src"]
