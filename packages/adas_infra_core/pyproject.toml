[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "adas-infra-core"
version = "0.1.0"
description = "Cross-cutting primitives: contracts, schemas, determinism"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7.0",
    "pyarrow>=16.0.0",
    "typing-extensions>=4.12.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/adas_infra"]

[tool.hatch.build]
sources = ["src"]
